pre-commit:
  commands:
    knip-fix:
      priority: 1
      run: bunx knip --fix --no-progress
      stage_fixed: true
    fmt:
      priority: 2
      run: bun fmt
      stage_fixed: true
    lint-fix:
      priority: 2
      run: bunx oxlint --fix --deny-warnings --report-unused-disable-directives
      stage_fixed: true
    lint:
      priority: 3
      run: bunx oxlint --deny-warnings --report-unused-disable-directives
    typecheck:
      priority: 3
      run: bun typecheck
    knip:
      priority: 3
      run: bunx knip --no-progress

pre-push:
  commands:
    test:
      run: bun run test:coverage
