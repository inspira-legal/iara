appId: com.iara.desktop
productName: iara
copyright: Copyright © 2026

directories:
  output: ../../release
  buildResources: resources

files:
  - dist-electron/**/*
  - "!dist-electron/**/*.map"

asarUnpack:
  - "node_modules/node-pty/**"
  - "node_modules/bindings/**"
  - "node_modules/file-uri-to-path/**"

extraResources:
  - from: ../server/dist
    to: apps/server/dist
  - from: ../server/node_modules/node-pty
    to: apps/server/node_modules/node-pty
  - from: ../server/node_modules/bindings
    to: apps/server/node_modules/bindings
  - from: ../server/node_modules/file-uri-to-path
    to: apps/server/node_modules/file-uri-to-path
  - from: ../server/node_modules/node-addon-api
    to: apps/server/node_modules/node-addon-api
  - from: ../server/node_modules/@anthropic-ai/claude-agent-sdk
    to: apps/server/node_modules/@anthropic-ai/claude-agent-sdk
  - from: ../web/dist
    to: web
  # WSL runtime: Linux Node.js binary + native modules for running server inside WSL
  - from: resources/wsl-runtime/node/bin/node
    to: wsl-runtime/node
  - from: resources/wsl-runtime/native_modules/node-pty/build/Release/pty.node
    to: wsl-runtime/native_modules/node-pty/build/Release/pty.node
  - from: resources/wsl-runtime/native_modules/@parcel/watcher-linux-x64-glibc
    to: wsl-runtime/native_modules/@parcel/watcher-linux-x64-glibc

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

dmg:
  artifactName: iara-${version}-${arch}.dmg

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
  category: Development
  icon: resources/icon.png

appImage:
  artifactName: iara-${version}-${arch}.AppImage

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  forceCodeSigning: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: iara-${version}-setup.exe
