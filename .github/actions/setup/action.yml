name: "Setup and install"
description: "Common setup steps for CI"

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.11"

    - uses: actions/setup-node@v4
      with:
        node-version: "24"

    - shell: bash
      run: bun install --frozen-lockfile

    - shell: bash
      run: cd apps/web && bunx @tanstack/router-cli generate

    - shell: bash
      run: bun run build
