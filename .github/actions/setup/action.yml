name: "Setup and install"
description: "Common setup steps for CI"

inputs:
  build:
    description: "Run full build after install"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.10"

    - uses: actions/setup-node@v4
      with:
        node-version: "24"

    - uses: actions/cache@v4
      with:
        path: |
          ~/.bun/install/cache
          .turbo
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
        restore-keys: |
          ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-

    - name: Install setuptools for node-gyp
      if: runner.os != 'Linux'
      shell: bash
      run: python3 -m pip install setuptools --break-system-packages || python3 -m pip install setuptools

    - shell: bash
      run: bun install --frozen-lockfile

    - name: Generate routes and build
      if: inputs.build == 'true'
      shell: bash
      run: |
        cd apps/web && bunx @tanstack/router-cli generate && cd ../..
        bun run build
