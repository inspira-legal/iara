name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test:coverage

      - name: Determine next version
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    if: needs.preflight.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux
            arch: x64
          - label: Linux arm64
            runner: ubuntu-24.04
            platform: linux
            arch: arm64
          - label: macOS arm64
            runner: macos-14
            platform: mac
            arch: arm64
          - label: macOS x64
            runner: macos-15
            platform: mac
            arch: x64
          - label: Windows x64
            runner: windows-2022
            platform: win
            arch: x64
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build and package
        shell: bash
        run: bun scripts/release/index.ts --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-publish
          shopt -s nullglob
          for pattern in \
            "release/*.AppImage" \
            "release/*.dmg" \
            "release/*.exe" \
            "release/*.zip" \
            "release/*.blockmap" \
            "release/latest*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: List release assets
        run: ls -la release-assets/

      - name: Create release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
