name: CI

on:
  pull_request:
    branches: ["*"]
  merge_group:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run lint

  fmt:
    runs-on: ubuntu-latest
    name: Format
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run fmt:check

  typecheck:
    runs-on: ubuntu-latest
    name: Typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  knip:
    runs-on: ubuntu-latest
    name: Knip
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bunx knip --no-progress

  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run test:coverage

  electron-smoke:
    runs-on: ubuntu-latest
    name: Electron Smoke
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: xvfb-run bun run electron-smoke

  release-smoke:
    runs-on: ubuntu-latest
    name: Release Smoke
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run release-smoke
