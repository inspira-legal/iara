name: CI

on:
  pull_request:
    branches: ["*"]
  merge_group:

jobs:
  quality:
    runs-on: ubuntu-latest
    name: Quality
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run fmt:check
      - run: bun run lint
      - run: bun run typecheck
      - run: bunx knip --no-progress
      - run: bun run test:coverage
      - run: xvfb-run bun run smoke-test

  release_smoke:
    runs-on: ubuntu-latest
    name: Release Smoke
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun scripts/release-smoke.ts
